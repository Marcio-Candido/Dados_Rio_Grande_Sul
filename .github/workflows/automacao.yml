name: Coleta de Dados DCRS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  coleta:
    runs-on: windows-latest

    steps:
      - name: Fazer checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas requests

      - name: Executar script de coleta
        run: python scr/baixar_dados.py
        shell: pwsh

      - name: Commitar e enviar dados gerados
        run: |
          git config --local user.name "Marcio-Candido"
          git config --local user.email "moc.candido@gmail.com"
          git add dados/
          git diff --staged --quiet || git commit -m "feat: atualização de dados meteorológicos"
          git push
        shell: pwsh